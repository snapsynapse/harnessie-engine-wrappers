name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install -e . pytest
      - run: python -m pytest -q
        env:
          HEW_REQUIRE_LIVE_PROBE: ${{ runner.os == 'macOS' && '1' || '0' }}
      - name: Run live confinement probe
        if: runner.os == 'macOS'
        run: harnessie-engine-wrapper-probe
      - name: Prove unsupported platforms fail closed
        if: runner.os == 'Linux'
        run: |
          set +e
          harnessie-engine-wrapper -- true
          code=$?
          set -e
          test "$code" = "69"
